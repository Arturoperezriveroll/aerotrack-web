name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Write runtime config
        shell: bash
        run: |
          cat > config.js <<'EOF'
          window.AEROTRACK_CONFIG = {
            mapboxAccessToken: "${{ secrets.MAPBOX_ACCESS_TOKEN }}",
            mapboxStyle: "mapbox://styles/arturoriverol/clmofit4704je01ma2d8fblkr",
            adsbRapidApiKey: "${{ secrets.ADSB_RAPIDAPI_KEY }}"
          };
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
